<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Work<span>Track</span></div>
    <div class="login-sub">Company Task Management System</div>

    <form class="login-form" (ngSubmit)="login()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" />
      </div>

      @if (error) {
        <div class="login-error">{{ error }}</div>
      }

      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:11px;" [disabled]="loading">
        {{ loading ? 'Signing In...' : 'Sign In →' }}
      </button>
    </form>

    <div class="demo-users">
      <div class="demo-title">Demo Accounts (click to fill)</div>
      <div class="demo-user" (click)="fillLogin('ameen','admin123')">👑 Admin — <code>Ameen</code> / <code>admin123</code></div>

      <div class="demo-user" (click)="fillLogin('kaviya','dev123')">🧑‍💻 Developer — <code>Kaviya</code> / <code>dev123</code></div>

  🧑‍💻 Developer — <code>Rajeena</code> / <code>dev123</code>
</div>

</div>
    </div>
  </div>
</div>
